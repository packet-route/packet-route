<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Lora:wght@400;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  </head>
  <body>
    <header class="site-header">
      <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
      <nav class="site-nav">
        {% for path in site.header_pages %}
          {% assign p = site.pages | where: "path", path | first %}
          <a href="{{ p.url | relative_url }}">{{ p.title }}</a>
        {% endfor %}
      </nav>
    </header>

    <main class="page-content">
      {{ content }}
    </main>

    <footer class="site-footer">
      <p>{{ site.title }} · AP CSP</p>
    </footer>
  </body>
</html>
